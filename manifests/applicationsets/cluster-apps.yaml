apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: bootstrap-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  generators:
  - git:
      repoURL: https://github.com/mvs5465-test/local-k8s-apps
      revision: main
      files:
      - path: apps/bootstrap-wave-0/*.yaml
      values:
        wave: "0"
  - git:
      repoURL: https://github.com/mvs5465-test/local-k8s-apps
      revision: main
      files:
      - path: apps/bootstrap-wave-1/*.yaml
      values:
        wave: "1"
  # Keep first-boot prerequisites ordered so ingress and External Secrets
  # exist before steady-state apps start reconciling.
  strategy:
    type: RollingSync
    rollingSync:
      steps:
      - matchExpressions:
        - key: cluster.local/wave
          operator: In
          values:
          - "0"
      - matchExpressions:
        - key: cluster.local/wave
          operator: In
          values:
          - "1"
  template:
    metadata:
      name: '{{ .metadata.name }}'
      namespace: argocd
      finalizers:
      - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .values.wave }}'
      labels:
        app.kubernetes.io/part-of: bootstrap-apps
        cluster.local/wave: '{{ .values.wave }}'
    spec:
      project: '{{ .spec.project }}'
      destination:
        server: '{{ .spec.destination.server }}'
        namespace: '{{ .spec.destination.namespace }}'
  templatePatch: |
    {{- if hasKey .metadata "annotations" }}
    # Forward source Application annotations (e.g. image updater config)
    # so generated Applications keep app-level behavior.
    metadata:
      annotations:
        {{- range $k, $v := .metadata.annotations }}
        {{ $k | quote }}: {{ $v | toJson }}
        {{- end }}
    {{- end }}
    spec:
      {{- if hasKey .spec "ignoreDifferences" }}
      ignoreDifferences: {{ .spec.ignoreDifferences | toJson }}
      {{- end }}
      {{- if hasKey .spec "syncPolicy" }}
      syncPolicy:
        {{- if hasKey .spec.syncPolicy "automated" }}
        automated:
          {{- if hasKey .spec.syncPolicy.automated "enabled" }}
          enabled: {{ .spec.syncPolicy.automated.enabled }}
          {{- else }}
          enabled: true
          {{- end }}
          prune: {{ .spec.syncPolicy.automated.prune | default false }}
          selfHeal: {{ .spec.syncPolicy.automated.selfHeal | default false }}
        {{- end }}
        {{- if hasKey .spec.syncPolicy "retry" }}
        retry: {{ .spec.syncPolicy.retry | toJson }}
        {{- end }}
        {{- if hasKey .spec.syncPolicy "syncOptions" }}
        syncOptions: {{ .spec.syncPolicy.syncOptions | toJson }}
        {{- end }}
      {{- end }}
      {{- if hasKey .spec "sources" }}
      sources: {{ .spec.sources | toJson }}
      {{- else }}
      source: {{ .spec.source | toJson }}
      {{- end }}
---
