apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
  - missingkey=error
  generators:
  - git:
      repoURL: https://github.com/mvs5465/local-k8s-apps
      revision: main
      files:
      - path: apps/wave-0/*.yaml
      values:
        wave: "0"
  - git:
      repoURL: https://github.com/mvs5465/local-k8s-apps
      revision: main
      files:
      - path: apps/wave-1/*.yaml
      values:
        wave: "1"
  - git:
      repoURL: https://github.com/mvs5465/local-k8s-apps
      revision: main
      files:
      - path: apps/wave-2/*.yaml
      values:
        wave: "2"
  template:
    metadata:
      name: '{{ .metadata.name }}'
      namespace: argocd
      finalizers:
      - resources-finalizer.argocd.argoproj.io
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .values.wave }}'
      labels:
        app.kubernetes.io/part-of: cluster-apps
        cluster.local/wave: '{{ .values.wave }}'
    spec:
      project: '{{ .spec.project }}'
      destination:
        server: '{{ .spec.destination.server }}'
        namespace: '{{ .spec.destination.namespace }}'
  templatePatch: |
    spec:
      {{- if hasKey .spec "syncPolicy" }}
      syncPolicy:
        {{- if hasKey .spec.syncPolicy "automated" }}
        automated:
          enabled: true
          prune: {{ .spec.syncPolicy.automated.prune | default false }}
          selfHeal: {{ .spec.syncPolicy.automated.selfHeal | default false }}
        {{- end }}
        {{- if hasKey .spec.syncPolicy "retry" }}
        retry: {{ .spec.syncPolicy.retry | toJson }}
        {{- end }}
        {{- if hasKey .spec.syncPolicy "syncOptions" }}
        syncOptions: {{ .spec.syncPolicy.syncOptions | toJson }}
        {{- end }}
      {{- end }}
      {{- if hasKey .spec "sources" }}
      sources: {{ .spec.sources | toJson }}
      {{- else }}
      source: {{ .spec.source | toJson }}
      {{- end }}
