apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster
  namespace: argocd
spec:
  description: Project for managing all cluster applications

  sourceRepos:
  - 'https://github.com/mvs5465-test/local-k8s-argocd'
  - 'https://github.com/mvs5465-test/local-k8s-apps'
  - 'https://github.com/mvs5465-test/loki-mcp-server'
  - 'https://github.com/mvs5465-test/cluster-query-router'
  - 'https://github.com/mvs5465-test/cluster-lite-wiki'
  - 'https://github.com/mvs5465-test/cluster-home'
  - 'https://github.com/mvs5465-test/github-pr-slack-notifier'
  - 'https://bjw-s-labs.github.io/helm-charts'
  - 'https://charts.external-secrets.io'
  - 'https://twin.github.io/helm-charts'
  - 'https://grafana.github.io/helm-charts'
  - 'https://grafana-community.github.io/helm-charts'
  - 'https://argoproj.github.io/argo-helm'
  - 'https://prometheus-community.github.io/helm-charts'
  - 'https://kubernetes.github.io/ingress-nginx'
  - 'https://jameswynn.github.io/helm-charts'
  - 'https://helm.irsigler.cloud'
  - 'https://jellyfin.github.io/jellyfin-helm'
  - 'https://charts.min.io'
  - 'https://vmware-tanzu.github.io/helm-charts'
  - 'https://charts.js.wiki'
  - 'https://helm.otwld.com/'

  destinations:
  - namespace: 'default'
    server: https://kubernetes.default.svc
  - namespace: 'monitoring'
    server: https://kubernetes.default.svc
  - namespace: 'argocd'
    server: https://kubernetes.default.svc
  - namespace: 'ingress-nginx'
    server: https://kubernetes.default.svc
  - namespace: 'external-secrets'
    server: https://kubernetes.default.svc
  - namespace: 'services'
    server: https://kubernetes.default.svc
  - namespace: 'ai'
    server: https://kubernetes.default.svc
  - namespace: 'github-pr-slack-notifier'
    server: https://kubernetes.default.svc
  - namespace: 'backups'
    server: https://kubernetes.default.svc
  - namespace: 'velero'
    server: https://kubernetes.default.svc

  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  - group: 'apiextensions.k8s.io'
    kind: CustomResourceDefinition
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRole
  - group: 'rbac.authorization.k8s.io'
    kind: ClusterRoleBinding
  - group: 'admissionregistration.k8s.io'
    kind: ValidatingWebhookConfiguration
  - group: 'networking.k8s.io'
    kind: IngressClass
  - group: 'external-secrets.io'
    kind: ClusterSecretStore
  - group: 'external-secrets.io'
    kind: ClusterExternalSecret
