# ArgoCD Helm Chart Values
# Reference: https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

# ArgoCD Server Configuration
server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # Command line parameters
  extraArgs:
    - --insecure

  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.lan
    paths:
      - /
    pathType: Prefix
    tls: false

  service:
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: http

  metrics:
    enabled: true

controller:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  metrics:
    enabled: true

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      cpu: 300m
      memory: 768Mi
  metrics:
    enabled: true

applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  metrics:
    enabled: true

notifications:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Dex Configuration
dex:
  enabled: false

# Repo polling interval (authenticated = 5000 req/hr limit, 1m = 60 req/hr)
configs:
  cm:
    timeout.reconciliation: 1m
  params:
    applicationsetcontroller.enable.progressive.syncs: "true"

# Global configuration
global:
  domain: argocd.lan
