# ArgoCD Helm Chart Values
# Reference: https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

# ArgoCD Server Configuration
server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # Command line parameters
  extraArgs:
    - --insecure

  # Ingress configuration
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - argocd.lan
    paths:
      - /
    pathType: Prefix
    tls: false

  service:
    annotations:
      traefik.ingress.kubernetes.io/service.serversscheme: http

  metrics:
    enabled: true

controller:
  resources:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 1000m
      memory: 768Mi
  metrics:
    enabled: true

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      cpu: 300m
      memory: 768Mi
  metrics:
    enabled: true

applicationSet:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  metrics:
    enabled: true

notifications:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Dex Configuration
dex:
  enabled: false

# Repo polling interval (authenticated = 5000 req/hr limit, 1m = 60 req/hr)
configs:
  cm:
    timeout.reconciliation: 1m
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane and excluded to reduce watched events and UI clutter
      - apiGroups:
        - ''
        kinds:
        - Endpoints
      ### Internal Kubernetes resources excluded reduce the number of watched events
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Request excluded reduce the number of watched events
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources excluded reduce the number of watched events and UI clutter
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
  params:
    applicationsetcontroller.enable.progressive.syncs: "true"

# Global configuration
global:
  domain: argocd.lan
